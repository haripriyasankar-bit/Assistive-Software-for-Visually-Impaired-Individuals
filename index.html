<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - ChatGPT Style</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-content">
                <div class="bot-info">
                    <i class="fas fa-robot bot-icon"></i>
                    <div>
                        <h1>AI Assistant</h1>
                        <span class="status-indicator">
                            <span class="status-dot"></span>
                            Online
                        </span>
                    </div>
                </div>
                <div class="header-controls">
                    <button id="voiceToggleBtn" class="voice-btn" title="Toggle Voice">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <button id="clearChatBtn" class="clear-btn" title="Clear Chat">
                        <i class="fas fa-trash"></i>
                        Clear Chat
                    </button>
                </div>
            </div>
        </header>

        <!-- Chat Messages Container -->
        <main class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <i class="fas fa-robot welcome-icon"></i>
                <h2>Welcome to AI Assistant</h2>
                <p>I'm here to help you with any questions you have. Just type your message below and press Enter!</p>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="chat-input-container">
            <div class="input-wrapper">
                <button id="micBtn" class="mic-btn" title="Voice Input">
                    <i class="fas fa-microphone"></i>
                </button>
                <textarea 
                    id="messageInput" 
                    class="message-input" 
                    placeholder="Type your message here or click the microphone to speak..."
                    rows="1"
                    maxlength="2000"
                ></textarea>
                <button id="sendBtn" class="send-btn" disabled>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div class="input-info">
                <span id="charCount">0 / 2000</span>
                <span class="hint">Press Enter to send, Shift+Enter for new line, or click 🎤 to speak (auto-sends when done)</span>
            </div>
        </footer>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>AI is thinking...</p>
        </div>
    </div>

    <!-- Error Toast -->
    <div id="errorToast" class="error-toast hidden">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorMessage"></span>
        <button class="close-toast" onclick="hideError()">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
